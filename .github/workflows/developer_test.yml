name: Gemini AI Developer Test

on:
  workflow_dispatch:
  push:
    branches:
      - developer_test

jobs:
  ai-dev:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install node-fetch

      - name: Collect repository code
        run: |
          find . -type f \
          -not -path "./.git/*" \
          -not -path "./node_modules/*" \
          \( -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" \) \
          > files.txt

      - name: Merge codebase
        run: |
          cat $(cat files.txt) > codebase.txt

      - name: Generate AI patch with Gemini
        run: |
          node <<'EOF'
          import fs from "fs"
          import fetch from "node-fetch"

          const code = fs.readFileSync("codebase.txt","utf8")

          const prompt = `
          You are a senior software engineer.

          Analyze the repository and improve the code.

          Focus on:
          - bugs
          - performance
          - readability
          - architecture

          Return only unified diff patch.
          `

          const res = await fetch(
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=" + process.env.GEMINI_API_KEY,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                contents: [
                  {
                    parts: [
                      { text: prompt + code }
                    ]
                  }
                ]
              })
            }
          )

          const data = await res.json()

          const text = data.candidates?.[0]?.content?.parts?.[0]?.text || ""

          fs.writeFileSync("ai.patch", text)

          console.log("Patch generated")
          EOF
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Apply patch
        run: |
          if [ -f ai.patch ]; then
            git apply ai.patch || true
          fi

      - name: Commit changes
        run: |
          git config user.name "gemini-ai-bot"
          git config user.email "ai@bot.com"

          git checkout -b ai-improvements || git checkout ai-improvements

          git add .

          git diff --cached --quiet || git commit -m "Gemini AI improvements"

      - name: Push branch
        run: |
          git push origin ai-improvements --force

      - name: Create Pull Request
        run: |
          gh pr create \
            --title "Gemini AI Code Improvements" \
            --body "Automated improvements generated by Gemini." \
            --base main \
            --head ai-improvements || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Gemini PR review
        if: github.event_name == 'pull_request'
        run: |
          node <<'EOF'
          import fs from "fs"
          import fetch from "node-fetch"
          import { execSync } from "child_process"

          const diff = execSync("git diff origin/main").toString()

          const prompt = `
          Review this pull request.

          Focus on:
          - bugs
          - security
          - performance
          - maintainability

          Provide actionable feedback.
          `

          const res = await fetch(
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=" + process.env.GEMINI_API_KEY,
            {
              method:"POST",
              headers:{
                "Content-Type":"application/json"
              },
              body: JSON.stringify({
                contents:[
                  {
                    parts:[
                      { text: prompt + diff }
                    ]
                  }
                ]
              })
            }
          )

          const data = await res.json()

          const review = data.candidates?.[0]?.content?.parts?.[0]?.text || "No review"

          fs.writeFileSync("review.txt", review)
          EOF
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Post PR review comment
        if: github.event_name == 'pull_request'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
          --body "$(cat review.txt)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
