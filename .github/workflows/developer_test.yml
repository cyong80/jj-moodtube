name: Gemini AI Developer Test

on:
  workflow_dispatch:
  push:
    tags:
      - 'test/*'

jobs:
  ai-dev:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.event.pull_request.base.ref || 'master' }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install node-fetch

      - name: Collect repository code
        if: github.event_name != 'pull_request'
        run: |
          find . -type f \
          -not -path "./.git/*" \
          -not -path "./node_modules/*" \
          \( -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" \) \
          > files.txt

      - name: Merge codebase
        if: github.event_name != 'pull_request'
        run: |
          cat $(cat files.txt) > codebase.txt

      - name: Generate AI patch with Gemini
        if: github.event_name != 'pull_request'
        run: |
          node <<'EOF'
          import fs from "fs"
          import fetch from "node-fetch"

          const code = fs.readFileSync("codebase.txt","utf8")

          const prompt = `
          You are a senior software engineer.

          Analyze the repository and improve the code.

          Focus on:
          - bugs
          - performance
          - readability
          - architecture

          Return ONLY a valid unified diff patch. No markdown, no explanation, no code blocks.
          Start directly with "---" or "diff --git".
          `

          const inputLength = (prompt + code).length
          console.log("[DEBUG] API key present:", !!process.env.GEMINI_API_KEY)
          console.log("[DEBUG] Input length (chars):", inputLength)

          const res = await fetch(
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + process.env.GEMINI_API_KEY,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                contents: [
                  {
                    parts: [
                      { text: prompt + code }
                    ]
                  }
                ]
              })
            }
          )

          console.log("[DEBUG] Fetch status:", res.status, res.statusText)
          console.log("[DEBUG] Fetch ok:", res.ok)

          const rawText = await res.text()
          console.log("[DEBUG] Raw response length:", rawText.length)
          if (!res.ok) {
            console.error("[DEBUG] Error response:", rawText.slice(0, 1000))
            throw new Error("Gemini API failed: " + res.status + " " + res.statusText)
          }

          const data = JSON.parse(rawText)
          let text = data.candidates?.[0]?.content?.parts?.[0]?.text || ""

          // 마크다운 코드 블록에서 diff 추출 (LLM이 ```diff ... ``` 또는 ``` ... ``` 형태로 감쌀 수 있음)
          const codeBlockMatch = text.match(/```(?:diff)?\s*([\s\S]*?)```/)
          if (codeBlockMatch && codeBlockMatch[1]) {
            text = codeBlockMatch[1].trim()
          }
          // "diff --git" 또는 "---" 로 시작하는 부분만 추출 (앞의 설명/마크다운 제거)
          const unifiedStart = text.search(/(?:^diff --git|^---\s)/m)
          if (unifiedStart > 0) {
            text = text.slice(unifiedStart)
          } else if (unifiedStart === -1 && text.length > 0) {
            console.warn("[DEBUG] No unified diff header found in response")
          }

          console.log("[DEBUG] Extracted text length:", text.length)
          if (!text) {
            console.warn("[DEBUG] No patch text. Full response:", JSON.stringify(data).slice(0, 500))
          }
          console.log("[DEBUG] Patch preview (first 300 chars):", text.slice(0, 300))

          fs.writeFileSync("ai.patch", text)

          console.log("Patch generated")
          EOF
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Apply patch
        if: github.event_name != 'pull_request'
        run: |
          if [ -f ai.patch ]; then
            echo "[DEBUG] Patch file size: $(wc -c < ai.patch) bytes"
            echo "[DEBUG] Patch content preview:"
            head -20 ai.patch
            if git apply --check ai.patch 2>&1; then
              git apply ai.patch && echo "[DEBUG] Patch applied successfully"
            else
              echo "[DEBUG] git apply --check failed. Trying --reject --whitespace=fix..."
              git apply --reject --whitespace=fix ai.patch 2>&1 || true
              if [ -n "$(ls -A *.rej 2>/dev/null)" ]; then
                echo "[DEBUG] Some hunks were rejected. *.rej files created."
                ls -la *.rej 2>/dev/null || true
              fi
            fi
          else
            echo "[DEBUG] No ai.patch file found, skipping"
          fi

      - name: Commit changes
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "gemini-ai-bot"
          git config user.email "ai@bot.com"

          git checkout -b ai-improvements || git checkout ai-improvements

          git add .

          git diff --cached --quiet || git commit -m "Gemini AI improvements"

      - name: Push branch
        if: github.event_name != 'pull_request'
        run: |
          git push origin ai-improvements --force

      - name: Create Pull Request
        if: github.event_name != 'pull_request'
        run: |
          gh pr create \
            --title "Gemini AI Code Improvements" \
            --body "Automated improvements generated by Gemini." \
            --base master \
            --head ai-improvements || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Run Gemini PR review
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          node <<'EOF'
          import fs from "fs"
          import fetch from "node-fetch"
          import { execSync } from "child_process"

          const baseRef = process.env.BASE_REF || "master"
          const diff = execSync(`git diff origin/${baseRef}`).toString()

          const prompt = `
          Review this pull request.

          Focus on:
          - bugs
          - security
          - performance
          - maintainability

          Provide actionable feedback.
          `

          const res = await fetch(
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=" + process.env.GEMINI_API_KEY,
            {
              method:"POST",
              headers:{
                "Content-Type":"application/json"
              },
              body: JSON.stringify({
                contents:[
                  {
                    parts:[
                      { text: prompt + diff }
                    ]
                  }
                ]
              })
            }
          )

          const data = await res.json()

          const review = data.candidates?.[0]?.content?.parts?.[0]?.text || "No review"

          fs.writeFileSync("review.txt", review)
          EOF
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Post PR review comment
        if: github.event_name == 'pull_request'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
          --body "$(cat review.txt)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
