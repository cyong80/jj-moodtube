name: Gemini AI Developer

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  ai-dev:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn add node-fetch

      - name: Collect repository code
        run: |
          find . -type f \
          -not -path "./.git/*" \
          -not -path "./node_modules/*" \
          \( -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" \) \
          > files.txt

      - name: Merge codebase
        run: |
          while IFS= read -r f; do
            path="${f#./}"
            echo ""
            echo "### FILE: $path (line 1 = first line of file content below)"
            echo "---"
            cat "$f"
            echo ""
          done < files.txt > codebase.txt

      - name: Generate AI patch with Gemini
        run: |
          node <<'EOF'
          import fs from "fs"
          import fetch from "node-fetch"

          const files = fs.readFileSync("files.txt", "utf8").trim().split("\n").map(f => f.replace(/^\.\//, ""))
          const code = fs.readFileSync("codebase.txt", "utf8")

          const prompt = `
          You are a senior software engineer.

          The codebase uses this structure for each file:
          ### FILE: path/to/file.ts
          ---
          <file content - line 1 is the first line below this --->

          CRITICAL for diff: When generating @@ hunk headers (e.g. @@ -12,7 +12,7 @@), the line numbers refer to line positions WITHIN EACH FILE ONLY. Line 1 = first line of that file's content (the line right after "---"). Do NOT use line numbers from the combined document.
          Available files: ${files.join(", ")}

          Analyze and improve the code. Focus on: bugs, performance, readability, architecture.

          ALWAYS use FORMAT A (diff format often fails due to @@ line number errors):

          FORMAT A - Full file replacement (REQUIRED):
          ### WRITE_FILE path/to/file.ts
          <complete new file content>
          ### END_FILE

          Do NOT use unified diff (@@ hunks) - it frequently fails with line number errors.
          `

          const inputLength = (prompt + code).length
          console.log("[DEBUG] API key present:", !!process.env.GEMINI_API_KEY)
          console.log("[DEBUG] Input length (chars):", inputLength)

          const res = await fetch(
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + process.env.GEMINI_API_KEY,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                contents: [
                  {
                    parts: [
                      { text: prompt + code }
                    ]
                  }
                ]
              })
            }
          )

          console.log("[DEBUG] Fetch status:", res.status, res.statusText)
          console.log("[DEBUG] Fetch ok:", res.ok)

          const rawText = await res.text()
          console.log("[DEBUG] Raw response length:", rawText.length)
          if (!res.ok) {
            console.error("[DEBUG] Error response:", rawText.slice(0, 1000))
            throw new Error("Gemini API failed: " + res.status + " " + res.statusText)
          }

          const data = JSON.parse(rawText)
          let text = data.candidates?.[0]?.content?.parts?.[0]?.text || ""

          if (!text || text.trim().length === 0) {
            console.error("[ERROR] Gemini returned empty content. Raw response preview:", rawText.slice(0, 2000))
            throw new Error("Gemini API returned empty content. Check API response structure.")
          }
          console.log("[DEBUG] Extracted text length:", text.length)

          // 마크다운 코드 블록 제거
          const codeBlockMatch = text.match(/```(?:diff)?\s*([\s\S]*?)```/)
          if (codeBlockMatch && codeBlockMatch[1]) {
            text = codeBlockMatch[1].trim()
          }
          text = text.trim()

          // FORMAT A: ### WRITE_FILE path ... ### END_FILE (diff 라인 번호 오류 회피)
          const writeFileRegex = /###\s*WRITE_FILE\s+([^\s\n]+)\s*\n([\s\S]*?)(?=###\s*END_FILE|###\s*WRITE_FILE|$)/gi
          let match
          let hasWriteFiles = false
          while ((match = writeFileRegex.exec(text)) !== null) {
            const path = match[1].trim()
            const content = match[2].trimEnd()
            if (path && content !== undefined) {
              fs.mkdirSync(path.split("/").slice(0, -1).join("/") || ".", { recursive: true })
              fs.writeFileSync(path, content, "utf8")
              console.log("[DEBUG] Wrote file (FORMAT A):", path)
              hasWriteFiles = true
            }
          }

          let patchText = ""
          if (!hasWriteFiles) {
            const unifiedStart = text.search(/(?:^diff --git|^---\s)/m)
            if (unifiedStart >= 0) patchText = unifiedStart > 0 ? text.slice(unifiedStart) : text
          }

          if (!hasWriteFiles && (!patchText || patchText.trim().length === 0)) {
            console.error("[ERROR] WRITE_FILE 형식도 없고, 유효한 patch도 없습니다. text 미리보기:", text.slice(0, 500))
            throw new Error("AI did not return valid WRITE_FILE or unified diff")
          }

          fs.writeFileSync("ai.patch", patchText)
          fs.writeFileSync("ai_used_write_file", hasWriteFiles ? "1" : "0")
          console.log("[DEBUG] Used WRITE_FILE format:", hasWriteFiles, "| Patch length:", patchText.length)
          EOF
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Normalize patch
        run: |
          if [ -f ai.patch ]; then
            sed -i.bak 's/\r$//' ai.patch && rm -f ai.patch.bak || true
          fi

      - name: Apply patch
        run: |
          if [ -f ai.patch ] && [ -s ai.patch ]; then
            echo "[DEBUG] Patch file size: $(wc -c < ai.patch) bytes"
            echo "[DEBUG] Patch content preview:"
            head -30 ai.patch
            applied=0
            if git apply --check ai.patch 2>/dev/null; then
              git apply ai.patch && echo "[DEBUG] Patch applied successfully" && applied=1
            fi
            if [ $applied -eq 0 ] && git apply --check --ignore-space-change ai.patch 2>/dev/null; then
              git apply --ignore-space-change ai.patch && echo "[DEBUG] Applied with --ignore-space-change" && applied=1
            fi
            if [ $applied -eq 0 ]; then
              echo "[DEBUG] Trying patch -p1..."
              patch -p1 -i ai.patch --forward 2>&1 || true
            fi
            if [ $applied -eq 0 ]; then
              echo "[DEBUG] Trying git apply --reject --whitespace=fix..."
              git apply --reject --whitespace=fix ai.patch 2>&1 || true
            fi
            ls -la *.rej 2>/dev/null || true
          else
            echo "[DEBUG] No ai.patch file found, skipping"
          fi

      - name: Cleanup generated files
        run: |
          rm -f files.txt codebase.txt ai.patch ai_used_write_file ai.patch.bak
          rm -f *.rej 2>/dev/null || true
          yarn remove node-fetch 2>/dev/null || true
          echo "[DEBUG] Cleaned up temporary files"

      - name: Commit changes
        run: |
          git config user.name "gemini-ai-bot"
          git config user.email "ai@bot.com"

          git checkout -b ai-improvements || git checkout ai-improvements

          git add .

          git diff --cached --quiet || git commit -m "Gemini AI improvements"

      - name: Push branch
        run: |
          git push origin ai-improvements --force

      - name: Create Pull Request
        run: |
          gh pr create \
            --title "Gemini AI Code Improvements" \
            --body "Automated improvements generated by Gemini." \
            --base master \
            --head ai-improvements || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
